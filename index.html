      </aside>
      <div class="app__inner">
        <header class="header">
          <form class="header__left search-form">
            <label for="search-input" class="visually-hidden"
              >Search resourses</label
            >
            <input
              id="search-input"
              type="search"
              class="search-form__input"
              placeholder="Search"
            />
            <button class="search-form__btn" type="submit">
              <img src="./assets/loupe-Icon.svg" alt="Search image" />
            </button>
          </form>
          <div class="header__right" style="visibility: hidden">
            <div class="user">
              <img
                class="user__img"
                src="./assets/user-image-test.png"
                alt="User image"
              />
              <button class="user__btn" type="button">User Name</button>
            </div>
            <button class="notice-btn">
              <img
                class="notice-btn__img"
                src="./assets/notif-Icon.svg"
                alt=""
              />
            </button>
          </div>
        </header>
        <main class="main-wrapper">
          <div class="cards-filters">
            <div class="cards-filter">
              <span class="cards-filter__title">Source</span>
              <div class="cards-filter__wrapper" id="filter-parent">
                <button
                  class="cards-filter__btn tag card__category is-active"
                  data-source="ALL"
                >
                  all
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-source="website"
                >
                  website
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-source="book"
                >
                  book
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-source="docs"
                >
                  docs
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-source="roadmap"
                >
                  roadmap
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-source="courses"
                >
                  courses
                </button>
              </div>
            </div>
            <div class="cards-filter">
              <span class="cards-filter__title">Grade</span>
              <div class="cards-filter__wrapper" id="filter-parent">
                <button
                  class="cards-filter__btn tag card__category is-active"
                  data-grade="ALL"
                >
                  all
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-grade="beginner"
                >
                  beginner
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-grade="medium"
                >
                  medium
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-grade="advanced"
                >
                  advanced
                </button>
              </div>
            </div>
            <div class="cards-filter">
              <span class="cards-filter__title">Cost</span>
              <div class="cards-filter__wrapper" id="filter-parent">
                <button
                  class="cards-filter__btn tag card__category is-active"
                  data-cost="ALL"
                >
                  all
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-cost="paid"
                >
                  paid
                </button>
                <button
                  class="cards-filter__btn tag card__category"
                  data-cost="free"
                >
                  free
                </button>
              </div>
            </div>
          </div>
          <div class="not-found is-hidden">
            <img src="./assets/empty.svg" alt="Empty" />
            <div class="not-found__inner">
              <h3 class="not-found__title">Упс! Ничего не нашлось</h3>
              <span class="not-found__info"
                >Похоже, такой ресурс еще не был добавлен. Попробуйте поискать
                что-то другое!</span
              >
              <button type="button" class="not-found__btn">
                Сбросить фильтры
              </button>
            </div>
          </div>
          <div class="main">
            <ul class="cards-list"></ul>
            <aside class="sidebar-details">
              <div class="sidebar-details__header">
                <button
                  type="button"
                  id="exit-btn"
                  class="sidebar-details__btn"
                >
                  <svg
                    class="sidebar-details__icon"
                    xmlns="http://www.w3.org/2000/svg"

                    y="0px"
                    width="24"
                    height="24"

                    ></path>
                  </svg>
                </button>
                <button type="button" class="sidebar-details__btn favorite-btn">
                  <svg
                    class="sidebar-details__icon"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      fill-rule="evenodd"
                      clip-rule="evenodd"
                      d="M11.9932 5.13581C9.9938 2.7984 6.65975 2.16964 4.15469 4.31001C1.64964 6.45038 1.29697 10.029 3.2642 12.5604C4.89982 14.6651 9.84977 19.1041 11.4721 20.5408C11.6536 20.7016 11.7444 20.7819 11.8502 20.8135C11.9426 20.8411 12.0437 20.8411 12.1361 20.8135C12.2419 20.7819 12.3327 20.7016 12.5142 20.5408C14.1365 19.1041 19.0865 14.6651 20.7221 12.5604C22.6893 10.029 22.3797 6.42787 19.8316 4.31001C17.2835 2.19216 13.9925 2.7984 11.9932 5.13581Z"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </button>
              </div>
              <div class="sidebar-details__content">
                <div class="sidebar-details__title-wrapper">
                  <h2 class="sidebar-details__title"></h2>
                  <img src="" alt="" class="details__img" />
                </div>
                <div class="sidebar-details__meta">
                  <span
                    class="sidebar-details__source card__category tag"
                  ></span>
                  <span class="tag grade-tag"></span>
                  <span class="tag cost-tag"></span>
                </div>
                <p class="sidebar-details__description"></p>
              </div>
            </aside>
          </div>
        </main>
      </div>
    </div>
  </body>
